<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave (Admin) - Leave Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h2 { color: white; font-size: 18px; }
        .navbar a { color: white; text-decoration: none; background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 6px; font-size: 14px; }
        .container { max-width: 500px; margin: 24px auto; padding: 0 16px; }
        .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card h1 { margin-bottom: 24px; color: #333; font-size: 22px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .btn { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-back { display: inline-block; margin-bottom: 16px; color: #667eea; text-decoration: none; font-size: 14px; }
        .flash { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .flash.error { background: #ffe0e0; color: #c00; }
        .flash.success { background: #e0ffe0; color: #060; }
    </style>
</head>
<body>
    <div class="navbar"><h2>🔐 Admin Panel</h2><a href="{{ url_for('admin_dashboard') }}">Back</a></div>
    <div class="container">
        <a href="{{ url_for('admin_dashboard') }}" class="btn-back">← Back</a>
        {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
        <div class="card">
            <h1>Apply Leave (on behalf)</h1>
            <form method="POST">
                <div class="form-group"><label>Select Trainer</label>
                    <select name="trainer_id" required>
                        <option value="">-- Select --</option>
                        {% for t in trainers %}<option value="{{ t['id'] }}">{{ t['name'] }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>Leave Type</label>
                    <select name="leave_type" required>
                        <option value="AL">Annual Leave (AL)</option>
                        <option value="SL">Sick Leave (SL)</option>
                        <option value="CL">Casual Leave (CL)</option>
                    </select>
                </div>
                <div class="form-group"><label>From Date</label><input type="date" name="from_date" required></div>
                <div class="form-group"><label>To Date</label><input type="date" name="to_date" required></div>
                <div class="form-group"><label>Reason</label><textarea name="reason" placeholder="Reason..."></textarea></div>
                <button type="submit" class="btn">Apply Leave</button>
            </form>
        </div>
    </div>
</body>
</html>
